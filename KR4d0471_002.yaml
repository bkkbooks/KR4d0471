body:
  text: 玉井樵唱卷中元尹廷高撰五言律信安秋晚西風吹客鬢天地一離愁黃菊山城雨青燈野店秋喬松填缺璋落葉澀寒流吹醒鄉關夢笛聲人隔樓客中思歸孤燈寒照影清夜自沈吟砧杵他鄉淚松楸故國心路長歸夢短酒淺客愁深了却江湖債攜書隱竹林嚴先生祠貂蟬何足凂鴻鵠竟高飛潮退江流急山深雲出遲草荒耕雨地苔合釣魚磯勳業皆塵土雙臺只漢時寧化縣齋思故園故園春又暮遊宦幾時回樹暗鶯虛老庭空燕自來石階風掃葉詩壁雨生苔最憶東籬菊誰分舊種裁尖山寺入門僧意古便覺隔塵氛清磬搖寒翠空廊貯白雲定回松落子畫剝蘚添紋仙筆今何在兒啼夜不聞挽詩友詩筒消息斷近作絶無聞碁石夜敲雨吟窗晝掩雲蒼苔間舊業芳草緑新墳愁見梅花面傷心正憶君故里兵火後故家盡焦土天地我何歸世數至此極人煙存者稀溪山雖不改巷陌已全非尚憶堂前燕傍誰門户飛奕山值寇讀杜詩有感杜曲衣冠盡群凶轉跳梁疏林巢燕雀空谷鬭豺狼衣濕彭衙雨砧敲楚岸霜年荒難自給拾橡當餱糧悲故鄉集杜詩句二首戰哭多新鬼江山雲霧昏餘生如過鳥故里但空村蜂蠆終懷毒狐狸不足論銷魂避鋒鏑作客信乾坤遭亂髮盡白憑軒涕泗流望鄉應未已疾惡信如讐嵗月亦已久千戈不肯休何時滅豺虎高枕對南樓信安送友歸開化客裏復送客君西我亦東相逢機易失欲别意難窮楊栁津亭緑桃花野渡紅不堪回首處江上雨濛濛翁村翠流閣四圍山翠合眇縹見危樓地狹星辰少雲深水石幽溪聲晴亦雨松影夏如秋寄語遊方者桃源豈外求壬午秋自翁村回奕山三首竟别桑乾水歸并却似家春風故巢燕夜雨廢池蛙石徑爭栽菊磚罏舊煮茶自憐萍梗迹何日定生涯讀了杜陵詩傷今思故時見應經事老貧悔治生遲醉可忘榮辱吟無救亂離老夫從所欲世事尚堪為十年流落苦鬢雪幾莖侵松菊寒歸約桑麻熱客心年荒思樂土故病怯清砧未遂東歸志空成梁父吟别友風雨江橋别凄然欲斷魂亂離難作客患難易為恩回首人千里論心酒一尊寄梅有良便好認白雲村耕雲寮即事二首掃影入林壑松邉旋結茅癖從俗子笑貧少故人交抱葉蟬遺蛻銜枝鵲理巢此中有清興無日不推敲閉門貧亦樂世態任炎涼夢穩疑宵短心間覺晝長與鷗分釣石留鶴伴丹房休笑生涯薄疏籬橘柚黃送王令尹一力行安靜臨民最有容官清琴獨古事簡印長封馬瘦亷聲出鱸肥歸興濃雙鳬早朝闕長樂聼疏鐘戊子八月邑再燬於冦庠序獨存曲突無先見偷安苟目前賞姦成飬虎稔禍起飛鳶戒石眠秋草空城鎖暮煙民彛終未泯庠序獨巋然贈雪涯遍閲諸瓢盡如師了悟難詩無蔬筍氣貌帶竹松寒破衲拿雲補殘經帶月看定回崖雪霽萬象只空觀同友訪厚軒歸晚松下間乘興相陪訪厚軒及門曽未久歸路已全昏鐘近山藏觀燈遙樹隔村書囊談未了何日再開尊贈葉羽士洞門長不鎖俗客到應難琴譜鶯能和丹爐鶴為看竹隂暗詩壁松子落玄壇道士清溪派虛堂管翠寒春晚即事晴雨都無定東君似不知蝸涎篆蝌蚪燕語譯侏離花事付杯酒桑隂落繭絲柴門久關閉吟思浩無涯送平山兄回西岸剪燭話寒更芳樽且緩傾飄零多舊夢離亂半平生山色秋看冷砧聲夜聼清轉頭千嶂隔風雨若為情送友回郡捧檄亂雲西頻宵夢好溪還家江蟹熟歸路峽猿啼山翠濕詩擔橋霜印馬蹄經行逢勝地濃墨灑留題南明寺金剎雄天半風傳鐘磬音石梁擔佛法崕瀑洗塵心古徑黃花淡山門翠柏深就中竒絶處小洞曲穿林山居青山深處隱時事不須聞門閉千峰雨樓吞萬壑雲種花籬密護接竹水遙分羞作干人態甘心鹿與羣八詠樓婺州披褐便歸休登臨底用愁樓空偏愛月山瘦不勝秋二水城根合孤雲天際浮倚闌千古意鴻影去悠悠江樓夜興戍鼓報三更危樓夜氣清詩成海月上夢覺浦潮生沙白昏漁火江空聞櫓聲歸心隨野鶴展轉到天明西湖嶽王墳高鳥何嘗盡良弓已弗存西風捲歸斾朔雪暗中原檜色猶含愧湖波不洗寃當年莫須有翁仲寂無言見徐判簿留村先生氷蘗平生志公餘户自扄待人絶城府臨政若家庭市井狐狸遁鄉村雞犬寧何慚古循吏耳目為公醒古杭秋日三首正自無聊賴西風更敗荷秋容森列嶂曙色耿殘河吾道青燈冷衰年白髮多麴生交久絶借汝挽春和故國無書問他鄉有弟兄霜風欺老病江海寄餘生黃葉天涯路清風雨外城東鄰似相惱深夜搗衣聲成毁乾坤老炎涼嵗月忙冥鴻既寥廓煙鷺亦滄浪江寺秋雲白宫墻夕照黃倚闌無限意一笑越山滄約正卿北行飲啄猶前定飄零豈偶然古梅村店路官栁御河船嵩華三生夢燕雲萬里天丈夫四方志未用賦歸田離杭别友勇作子長遊翻成老大羞山川幾兩屐天地一扁舟何處無黃犢吾生負白鷗離情正悽斷風絮更悠悠長蘆舟中夜坐故國五千里孤帆四十程客懷偏浩蕩鄉夢不分明萬折河流曲三更斗柄橫不眠方晏坐野寺又鐘聲燕山秋夜十宵九歸夢搖落故鄉心星象連雙闕秋聲起萬砧風霜添老色天地入清吟兒女應相憶青燈語夜深長蘆舟中值雪清景不常得吟邉急用摹天風吹短艇暮雪過長蘆水港行終澀煙村望欲無不須歸興急權當剡溪圗北歸留杭笑指家山近何妨復暫留樽前萬里客天際一歸舟黃葉來時路青燈舊日樓醉餘還自笑浪迹類江鷗抵杭聞章古泉下世揮淚二首湖山相送日此别遂千秋嵗晚古人盡天涯老淚流百年真過鳥一笑竟荒丘烏石江頭路寒花蝶也愁俗子存何益詩人去可傷青山頓塵土黃葉半凄涼託後遺言在論交古意長九原呼不起天濶意茫茫歸來心知歸計是猿鶴亦欣然松頂留殘雪簷牙起暮煙解琴彈膝上把酒話燈前洗淨塵埃面看山且勿眠真誥巖真人仙去久洞穴尚􅀈􅞛殿滴空嵓雨廊穿别嶂霞對門孤石峭開牖亂峰斜欲跨蟾蜍背騰空採月華期男祖志未至失學嗟何及應門望汝賢來遲春雨後立盡夕陽天山店村村栁江湖日日船何時占鵲喜袖簡拜庭前京都三首鰲極曽重建真元一氣鍾乾坤雄析木日月繞居庸霽色千門栁高風半夜鐘儒生亦何幸白首際時雍萬里觀光客吟懷浩蕩間黃埃深似霧緑樹逺疑山海鶴當秋奮宫鴉入夜還破愁惟有酒春色上衰顔如許山河壯重來謾寄遊紅雲金闕曉黃菊玉泉秋迂䇿知難用頽齡竊自羞長鑱歸斸雪聊復自為謀癸丑三月得去年七月所寄家書飄泊天涯逺鄉音日以疏又成經嵗别忽得去年書客裏無窮事燈前薄醉餘沈吟不自已一紙卷還舒病起卧疴經月久風雨少開扉病起花隂滿詩成燕子歸寸間關晚福一笑閲春暉但得身強健登臨尚有期七言律江東書懷敗葉蕭蕭亂打窗山河入望正凄涼千年巷陌風流盡一曲庭花霸業荒馬載客愁嘶楚月鴈傳鄉信帶吳霜悠悠今古興亡事斷礎寒煙幾夕陽梅花二首老樹粘雲凍欲皸疏花數點自精神絶無煙火塵中氣可是山林物外身氷淨湖天長浴影雪深人世未知春清高莫道交遊少月與同窗竹與鄰偃蹇虬枝帶蘚斑暗香和月到闌干修來仙骨身千劫琢透春痕玉一團氣味自清非傲俗標姿雖瘦却禁寒橫斜疏影描難盡更寫梅真子細看桂花吹老西風粟滿梢天來爽氣助揮毫影搖夜月金波碎香度秋雲玉宇高萬點嬌黃光醉眼一團冷翠潤征袍吟邊受用清無盡獨據繩床興轉豪海棠李花帶俗杏花粗爭似天然蜀錦圗雨暈香脂嬌欲滴日酣紅袖醉相扶未消光彩搖銀燭且約芳菲伴玉壺欲辦窗間小橫軸丹青易染態難摹壽光宮清都縹眇踞林巒幽致曽圗入內看跨虎仙升丹井廢畫牛人去硯池寒白雲片片封宫樹黃葉年年下石壇風景不殊時事改吟成無語拍闌干題翠峰貫休舊隱乘風長嘯翠峰頭喚醒當年老貫休境界高寒多得月松筠瀟灑密藏秋蜀尼曽禮空中剎吳越難添句裏州劫外有家人不識白雲千古意悠悠中秋錢唐玩月雲端擁出水精毬清逼銀河不敢流自開闢來同此月最分明夜是中秋兩間勢隔三萬里一鏡光涵幾百州寂寞庾公千古意何人今夕更登樓贈僧粟庵高人不厭屠蘇小世界曾將一粟包舊衲每於間日補定鐘常帶暮煙敲苔當石縫緘蟲穴藤上林梢結鳥巢不是逃名湖海客誰家物外結清交寄粟庵手把黃花種翠微蒲團清味少人知夜涼露濕松間衲地冷苔侵壁上詩古錫占雲龍去久暮鐘敲月鶴歸遲參師欲問西來意只恐難酬支遁辭送章令尹事簡尋常早放衙槐根寂寞雀堪羅印生緑蘚文移少廳對青山詩料多千室春風響機杼一簾夜月聼弦歌雙鳬此日朝天去白玉堂中穩佩珂挽羽士周清卿羽扇綸巾何在哉仙源遺迹已塵埃匣中失劔龍俱去松下無琴鶴不來拜斗壇荒惟敗葉燒丹竈冷鎖蒼苔孤猿呌落青山月幽夢何曾喚得回山中冬日寄緑坡畏寒終日閉柴門世事炎涼總不聞老鶴踏翻松頂雪亂猿啼裂隴頭雲強呼竹葉間澆悶吟對梅花正憶君何日相過茅屋下夜燒黃葉坐論文自得紛紛世事總樊籠跳出門邉百慮空萬壑梅花千古月五湖煙水一帆風消磨有酒嵗時樂發越無詩天地窮隨分溪山足耕釣悠悠逸興寄冥鴻桐江舟中又搖柔櫓下嚴灘一片離情強自寬鴉噪暮雲天寂寂鴈歸極浦水漫漫敲篷雪霰和愁碎拍枕江聲入夢寒今夜客帆何處宿亂山青外是長安臨汀書懷開盡黃花秋又深不堪清夜聼寒砧燈前逺信和愁寫枕上新詩帶夢吟霜月一汀隨瘦影關山千里動歸心青鞋布襪雲間寺何日鷗盟許再尋謝友人寄梨大谷風流品最高筠籃分餉寄邉遙香含白雪凝肌瑩脆嚼清氷到齒消飣座恍疑見顔色搗漿還洗闕枯腸得此時沾潤不假盧同茗碗澆亂後思家熢燧亂山無鴈飛家書動是隔年期祖塋樵採誰能主舊宅存亡未可知園竹想添穿壁笋庭梅應有亞欄枝歸歟何日安生理剪燭西窗説亂離避地客奕山故國青山一眺中峽溪獨此最高峰百來畝地多桑柘十數人家依竹松春水池塘看浴鷺夕陽籬落聼衙蜂日間無事鈎簾坐吟對梅花了一冬懷樓巗先生吾宗樓巗先生事理宗有樓巗詩集懷故山詩曰家在樓峰下巉嵓指顧間十年常作客一日不忘山木為風霜老雲從澗壑間清宵有歸夢終不當身還俊偉如公今已而典型空使里人思平生實厯數張紙身後虛名一卷詩黃菊無情寒蝶散青山易主冷猿悲孤煙落日人千古載酒無緣可問竒錢唐懷古二首黃旗紫蓋竟悠悠石鏡塵昏王氣休江上怒濤空拍岸海門孤嶂自橫秋琵琶曉月青娥淚禾黍西風墨客愁寄語湖山半間老當時肉食為渠羞鐵鎖沈江事已非枉將陽九咎天時皇王運會無停息南北山河幾合離吳越英雄春夢斷張韓勳業暮雲悲凄涼一掬興亡淚隱隱遙峰哭子規會稽古陵彩雲散去老松衰劫換餘灰世已非地冷玉魚猶未朽海深金鴈亦能飛五陵王氣有時盡萬里中原無日歸牧豎亡羊千古恨九疑山下一沾衣庚辰故里再燬於寇流落信安僧舍風雨凄涼羈愁野寺兩凄然又是西風落葉天疏雨半簷澆客恨白雲一榻對僧眠孤吟天地知何益隻影江湖祗自憐喚醒十年鄉國夢空山古木亂鳴蟬思鄉二首遊子春深思故鄉愁聞杜宇哭斜陽世情巇嶮多溪壑客鬢蕭疏易雪霜百里荒涼少雞犬十年奔走避豺狼何時安坐無行役一篆銅爐清晝長轉目桑田又海波一襟豪氣半消磨故園春老蒼苔長客路秋深黃葉多獨有吟懷未搖落却愁歸計易蹉跎種桃何處尋生理烏帽青鞋隱薜蘿翁村度嵗江空嵗晚轉凄然蹤迹東西亦恁緣柏酒惜春澆别恨梅花帶雪過新年笑同兒女挑燈話愁憶家山聼雨眠詩債窘人歸未得探囊且送酒家錢隴首庵幾畨間作探梅遊瀟灑屠蘇俯碧流橋影平分一溪月瀑聲飛落半巗秋嵐生佛殿莓苔濕翠染僧衣竹樹幽欲把新詩描勝境不妨且為白雲留歸謁大中祖墳悠悠不見鶴歸來大地傷心變劫灰半世天涯添白髮何人松下酹青苔雲深松徑狐狸卧月落空山杜宇哀隴樹蕭疏風色慘相傳先世手親裁癸未秋買山卜居南塢名耕雲寮世事從頭幾變更結廬聊爾定吾生十年遭亂頭將白一日居山夢亦清瓜圃曉分流水灌秧田春帶濕雲耕葛巾野服從今始甘與漁樵混姓名尹緑坡見寄耕雲寮詩有窗留曉月描花影澗瀉春泉浴栁陰之句故次韻拜貺家住翠微深復深了無塵事只間吟竹籬茅舍山林志紙帳梅花道義心日和陶詩酬野興時披周易坐松隂約君對卧煙雲外細聼山泉漱玉琴緑坡山居十年離亂謾思家孤負東山幾度花白鶴有心戀華表青猿無夢到天涯春風添種陶潛菊暇日重評陸羽茶甚欲從君賦招隱小舟分釣栁邉沙過故里感懷二首衰草寒煙繞故基東山無復舊薔薇烏衣飛去巷猶在白鶴歸來人已非嵗月如流華髮改事機不再壯心違釣遊蹤迹今成夢古木蕭疏伴月暉松菊荒涼二十闕衣冠散盡只空村燒明斷塹山雲暝鬼哭寒蕪巷月昏水涸蛟龍移窟宅草深狐兔長兒孫唯消一夜崑崙雨洗盡千峰見緑痕挽尹曉山行輩如君能幾人秋風孤鴈獨離群曰斜客舍迷春夢天濶家山隔暮雲清苦一生磨蝎命凄涼千古耒陽墳吟窗月落前村曉孤鶴聲哀不忍聞挽王梅窗故宅荒涼鎖白雲招魂無計淚沾巾吟編散盡難知次遺像清癯已逼真化鶴山頭笙韻歇浴鵝池畔墨痕新緑衣歌散羅浮曉月落參橫不見人除夕梅花嵗晚已離披日月如流不自知地落迤南春到早天高直北厯來遲急風竟夕清殘葉凍雪終冬壓敗籬可是吟懷氷樣冷桃符只用舊年詩遊太虛觀洞府含虛境界寬攜笻一笑把黃冠千年泉石藏清氣萬壑煙雲生翠寒薜葉覆簷蒼鼠竄竹隂搖壁老龍蟠間心久在丹霞外問道行尋靖長官寄汀州伍明夫貢元鬢髮遙知各已蒼側身南望正凄涼山河遙隔三千里雲樹相思二十霜目斷塞鴻傷契濶夢隨遼鶴弔興亡世間何處無明月偏向吾廬照屋梁送葉一山求官金臺百尺正招賢肯戀槎川二頃田直欲排雲呌閶闔未應釣月老林泉劒橫壯氣衝燕雪馬踏平蕪度楚煙他日北方看焰熖願乘欵段候歸韉夏午槐隂影落蒼苔冷未收薰風交舞翠蟠虯當天赤日不知暑覆地緑隂長似秋蟻夢半酣時正晝蟬聲四起境逾幽昻霄聳壑生平志願展清隂庇九州十月海棠千林黃葉逐空飛一見名花眼似癡偷泄春妍明蜀錦薄勻霜粉護燕脂粧猶怯曉那云睡嬌不禁寒強自持見説江梅將納聘芳菲誰道不同時牡丹菊不假陽和一線功誰移洛裔入幽叢清高正色秋風裏富貴回頭春夢中冷艷似將金縷襯暖香何用碧紗籠籬邉若使唐人見應笑淵明所愛同遊太虛觀臨池賦詩水影一句竟不能偶大兒祖憲以谷聲遙答嶺頭猿為對亦粗可用因足成篇路入煙羅别有天我來散髮坐風軒玉壺積翠花香潤石洞藏丹雲氣溫水影倒棲松頂鶴谷聲遙答嶺頭猿箇中妙處誰能畫寫入篇章當草玄金陵懷古虎踞龍蟠畫不如當時宫殿莽為墟孫劉霸業一壞土王謝虛名數板書瓜步風濤空浩渺鍾山松竹尚蕭踈自從此老爭墩後擾擾於今總為渠登六和絶頂江分吳越緑漫漫間向浮屠絶頂看目覽錢唐殊覺小身遊玉宇不知寒海連芳草春潮急山擁頽陽古木蟠遊子舉頭應怪問何人天半拍闌干秋懷二首茫茫禹迹事悠悠怪雨盲風恣弄秋絆足鷹鸇霄漢志隨陽鴻鴈稻梁謀木侵元氣山偏瘦渠壅寒沙水不流自笑野人藜莧腹間愁不覺白侵頭玉露高寒滿眼秋先生何以自為謀巧裁雲霧供吟料碎折波濤補破裘月不孤人常入户山如惱我故遮樓幸然免被微官縛間坐間眠得自由玉井峰會一堂五首數間茅屋萬山巔天賜間人地自偏門外逺峰銜落日簷前古木卧蒼煙葛衣草食從吾志紙帳蒲團了夙緣偶向空城裁翠柏莫將境會趙州禪閴然空宇悄無聲趺坐安禪境最清四壁與天元不隔六窗含月喜長明投機要識無繻鎖煮茗時燒折足鐺自笑幽人尚多事長鑱帶雪斸黃精嶙峋絶頂最高寒時捉枯藤自往還世界大千豪髮裏古今厯劫剎那間桑田海水雖無定松月蘿風儘自間一念萬年清絶點何愁不透祖師關一泓巖脊小方池石磴崚嶒緑蔓垂混沌鑿開蒼玉璞甘寒湧出碧琉璃虎留地上跑泉迹龍借山中卓錫基飲水曲肱吾願足騰騰任運復奚為堂西隙地冠諸峰境界清寒萬慮空一徑白雲山窈窕滿林空翠日𡨕濛霜筠雪竹塵埃外澗草巗花縹眇中靜立頓忘人世事泠然便欲躡清風堂成而方外芥室和尚玉溪道士訪豫玉井峰相對啜茶一笑忘言真會一也攜手孤峰躡紫霞船來陸到總無差從教廬阜傳三笑要學雙林會一家格物隱然參柏子飬心即是煉丹車莫將門户論分别鼎踞蒲團且啜茶憫忠閣鴨緑江頭往事空燕丹墓側幾秋風乾坤戰骨何曾朽蒼海餘哀未有窮黑志可能忘小國赤心聊復慰孤忠悠悠遺恨人千古回首金甌夕照中寄劉千里一道藜光照座寒東風吹入五雲斑何時又渡桑乾水他日無忘飯顆山揮翰風流三島客種花消息數年間開尊莫負湖山約握手朱樓緑樹灣傅巗瀑布人去騎箕傳世久空巗何事挂飛泉四時變作無窮景一去空濛太素天妙處已無詩可説望中未信畫能傳雖然不復為霖雨猶作西郊大有年送朱冬青赴漁浦稅青衫未著且同征坐對吳山晚倍明曉市魚蝦官錁足春江鷗鳥客吟清胸中老氣吞銀浪句裏西風帶赤城煙樹迷茫空惜别陽關歌罷暮潮平章春谷編永和志成地圗東盡海雲邉撰集如今洵可傳九斗光華歸傑作千年文獻續遺編登臨往迹跨靈運抵牾人空識馬遷自嘆三家村裏客得來紙上考山川永嘉秩滿代者未至思歸風雨空齋強自持嵗縻廪粟幸逃譏玉龍禱罷終成棄梁燕栖深不似歸已促山童開菊徑久慚野鶴候柴扉瘠耕寒釣平生志清夢頻宵繞翠微挽僧無極石頭路滑少人行獨我談玄幾叩扄同德講經如昨日葛川扣角又來生雲橫古塔巢秋鶴塵鎖空堂照暮螢玉塵不揮消息斷庭前柏樹緑成隂信安懷故人昔年避地此飄蓬訪舊重來事不同蒼狗浮雲春夢裏寒鴉古木夕陽中死生契濶交情在離合悲歡轉眼空野寺賡酬無復再兔葵燕麥自搖風哭緑坡二首種菊東籬志未償騎鯨竟往白雲鄉山中招隱人遼邈地下修文事渺茫秋月春花吟不盡汀蘭岸芷死猶香不堪回首看西峽孤嶂寒煙正夕陽半溪雪壓釣魚船已矣知音我絶弦月犯少微人共惜日斜庚子讖先傳青騾一去真如夢白鶴重來不計年門掩樓峰消息斷只愁雲氣濕殘編東湖懷古金谷繁華何在哉畫堂一炬竟飛灰寒煙斷草妖狐卧明月空山老鶴哀草合故基移主久花臨壞砌為誰開玉樓歌散風流斷舊日烏衣不復來寄厚軒醉别玄都觀裏春竹風扶夢每懷君兩鄉吟思共秋月一段離愁隔暮雲載酒登山成負約裁詩寄驛當遺文何時共剪西窗燭抵掌清談到夜分西湖秋日深秋幽興在平湖佇立微吟獨撚鬚黃鶴孤飛盤古木翠禽危立顫枯蒲斜河淡月互明滅逺嶂寒煙半有無自是胸襟發清氣不愁佳景總難摹山居穿幽眺逺兩俱清石徑斜通栁外亭籬落有香花淡淡洞門無瑣竹青青松聲禽響調音樂雲氣山光擁畫屏吟罷不知林月曉倚闌間看鶴梳翎三嵓瀑布天然石室踞雲根上有飛泉勢若奔千尺素簾寒不捲一潭碧玉碎無痕風飄餘濕沾香案月漏疏光射洞門我欲捫蘿登絶頂桃花流水細窮源再闢耕雲隱居鑿巗重闢舊吟廬天遣幽居入畫圗茶竈筆床清意思蒲團竹榻靜工夫田園自覺淵明是泉石甘隨栁子愚莫笑吾居僅容膝心間無事即蓬壺寄葉紫霞六印何如二頃高登山臨水足逍遙魯褒謾道錢無翼陶令羞因米折腰半枕松風清夏溽一尊花酒醉春宵鑽營多少燕臺客見説風沙涴黑貂送劉如晦解任著書飲水淡忘飢出處初心忍自違驥服鹽車方困辱鵠離矰􅗤正高飛山深林密吾終隱嵗晚江空子亦歸贏得旁人笑奔競到頭事業總難期平逺亭松陽竹溪野水漫漫接白雲憑闌轉覺興撩人一川芳草青無際數點遙峰淡不真煙樹夕陽開畫軸風帆沙鳥伴吟身箇中儘有間田地何必桃源更問津送趙義甫回汴梁久客江隂汴堤緑栁漫闌珊公子南遊久未還故國凄涼丹鳳逺春江浩蕩白鷗間忽思茅屋苔痕長愁對簷花鬢髮斑歸見江南舊耆宿為言清夢繞嵩山雙溪道中值風雨竹輿咿􅥆嶺嶇﨑三宿才方出翠微逺水帶煙爭晚色西風挾雨作寒威緑沙路繞黃泥坂烏桕林藏白板扉屈指重陽歸又近樽前兒女笑牽衣贄見虛谷方使君斬佞當年著直聲於今翰墨哭單行典型尚見靈光古德政常留釣瀨清瓜熟東門遺世味菊香晚節壽耆英願公長作斯文主只把湖山當闕泓次韻瑞卿見潮誰將鐵鎖截江橫怒激雷霆白晝轟色湧爛銀明逺浦聲隨戍鼓上蕪城尾閭欲泄終辭垢滄海難量孰概盈休訝大雲能沸鼎乾坤氣脈自流行送曲子敬上海教官蜃樓五色倚晴空闕接巍巍孔氏宫闕挾一氊從此去飬容三釜許誰同秃蛟吸硯生秋霧健鶻辭鞲奮北風别後闕新作闕好裁玉版寄征鴻次韻於行可秋聲葛衣未晚薄寒生獨怪西風不勢情吟思幾畨來野景離愁一半在秋聲空江白鳥生無際缺月踈桐畫未成如此江山更流落驚心曉鏡雪千莖挽徐母吳氏徐留村母母儀婦道儼如存多積隂功裕後昆眼見銅章榮隊子手攜銀鹿弄諸孫一簪白髮霜前操萬竈青煙雪裏村只恐穹碑書不盡更看旌表貴高門古杭守嵗出處還同挂搭僧危樓更住最高層桃符闕山家夢雪片梅花客舍燈獨擁弊裘闕子女旋抄新藁寄親朋春風萬里中原客老眼行將見未曽次韻蘭室玉皇閣觀雪紫雲樓閣聳層空雪裏藝闕傲朔風得句神遊元氣表倚闌身在畫圖中大千世界天花墜百萬人家玉色同極目不知雲盡處瓊田遙接海門東丙午春重遊越中千巗競秀鬱蒼蒼不上蓬萊四十霜白髮俊冠人老大青燈茒店客凄涼化熊穴古山雲白飛翼樓空海月黃欲踞金鰲觀八極劃然長嘯暮天長維揚懷古漣漪四面繞蕪城蕩盡當年殺氣腥電掃霆奔餘百戰河清海晏際千齡天開西北方輿大山在東南半角青可是杜郎無感慨只吟豆蔻賞娉婷高郵道中浩蕩乾坤幸止戈甲兵不見見漁蓑土墻茅屋安淮俗桞港蘆灣接泗河古堞平來春草合荒田耕遍夕陽多長淮咫尺中原近願借南風吹白波渡淮濵河廢壘草離離尺寸紛爭彼一時著眼道旁看覆轍平心局外説殘棊中流白浪搖詩夢古塞黃雲付牧兒身老太平無事日扁舟萬里鬢絲絲中秋玩月桂殿高虛夜不扄婆娑樹影見分明天臨九域燕逾壯月在四時秋獨清大地山河開古鏡涼宵風露濕寒瓊開樽淨洗愁千斛爛醉那知斗柄橫送劉千里南歸身外功名不足論可堪客裏酌離樽堂堂嵗月青天在渺渺江山白霧昏舟入泗河氷未合人歸三徑菊猶存丈夫事業何憂晚積水行翻萬仭源送洪中立赴雷州教授幾人壯志窘黃埃獨子青雲得意回萬里江山馳曉驛一氊風雨聼春雷倚門慈母占烏鵲開徑童兒掃緑苔只恐未能溫講席促歸又對玉堂梅客樓感嘆北風吹客客思家兀倚闌干度嵗華濕雪寒雲仍臘意危樓高燭尚天涯悠悠歸興投林鳥冉冉殘年赴壑蛇入手春風消息近且將一笑寄梅花錢唐登舟江風吹雨灑江煙薄暮攜笻獨上船鳥鵲聲中傳意去白鷗群畔對愁眠春山笋蕨三年夢客路雲萍萬里天但得此身強健在流行坎止更隨緣江心寺潮落潮生卒未休依然雙嶼鎮中流斗杓橫截江城北殿腳長隨雪浪浮龍起太虛雲護塔僧歸薄暮月隨舟翠華夢斷鈞天逺翰墨空軒竹樹秋登淨江寺松風閣巋然傑閣倚松岡縱使無風也自涼四面闌干金碧界萬家城郭水雲鄉清江疉嶂迷空濶白鳥蒼煙墮渺茫風景不殊君記否吳山頂上看錢唐永嘉得代後還家舟中作冷淡生涯夢亦安回頭苜蓿愧朝盤飛鴻印雪空留迹病鶴辭籠更整翰野色熹微三徑近秋風浩蕩五湖寬還思鴈蕩經行處贏得題詩滿世間山居晚興高住青峰不計層閉門危坐絶交朋竹聲欲斷微聞雨村色初昏遠見燈宿鳥並枝間寂寂歸雲度壑慢騰騰鄰翁笑我生涯拙紙帳梅花絶類僧伯顔丞相第在苜蓿地當代麒麟第一功及門尚想見英雄征南事往圗書在上殿人非劍履空房杜子孫還有幾伊周事業許誰同緑槐庭院無車馬坐聽黃鸝韻曉風三寶奴丞相故宅今為法藏寺太山頃刻化氷山偃月堂空一夢殘富貴轉頭成鬼朴姦諛到死帶奴顔梁間燕子新依佛栁外蛙聲併屬官門户凄涼千騎散獨留野鶴守禪關阮民望惠東海集乃文丞相所書鄧中甫詩卷中多文公酬和之作代簡拜貺當時海嶺共飄零顛沛猶存伐木情楚澤吟魂疑未死顔公墨迹儼如生眼中乍覺龍蛇走世上空慚蛙蚓鳴几案劃來雙白璧燈前老眼為渠明燕山除夕客裏光隂祗暗驚擁爐危坐惜殘更年華不逐燈花盡春意先隨酒暈生身外利名應絶念眼中兒女未忘情明朝六十身強健歸續寒松嵗晚盟告病致仕别李尚書莫將姓氏撓銓衡數畝蒼苔尚可耕明月孤舟從此去白雲一壑有誰爭病身未老先謀隱古道無人謾獨行洗淨平生塵土面夕陽蘿徑步春晴渡淮蹇驢破帽壓京塵天地何心役老身渺渺黃流東去水蕭蕭白髮北歸人陽和忽上風霜面夢寐先尋竹石鄰别却江湖鷗鷺伴願攜短䇿躡嶙峋玉井樵唱卷中
