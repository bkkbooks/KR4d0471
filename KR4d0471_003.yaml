body:
  text: 玉井樵唱卷下元尹廷高撰五言古出都門二首面目已可憎我思滌其埃旅食雖八珍何如脯蒼苔獨鶴高拏雲萬牛不可回寒日淡平野浩歌歸去來振衣出都門八荒何茫茫白雲千里峰渺在天一方鴐鵝自東歸鴻鴈紛北翔出處各有志未許俗子量永嘉書所見此邦幸小稔竊祿似有緣出門見流民令我心惻然十十復五五乞食相後先有男方呱呱中道甘弃捐誰無父母心其勢難兩全况遭疫癘苦十病無一痊死者相枕籍活者難久延彼哉萬錢箸所厭皆肥鮮餓骨半王孫汝食能下咽嗟嗟吾赤子斯食寄之天似聞齊魯郊斗粟價十千詠古二章長安東陵瓜五色光彩溢風味自不同此老真且實誰謂秦無人斯高誠妬嫉事往且勿道抱甕了白日右詠邵平雙臺倚秋空山色轉高潔白雲出未歸幽鳥啼不歇昭然動星象偃卧方恍惚舉足即多事且踏石上月右詠嚴光七言古郗令尹四望亭雙溪繞郭山為城四山叠翠如畫屏溪山深處著小亭林塘瀟灑蒲荇青令君公餘淡無營來此環眺心目醒洞庭八荒皆户庭手揮五絃水泠泠讀史有感白浪排空孤島絶黑風翻海萬檣折天高茫茫呌不聞一夕貔貅化魚鱉開邊大將知何人扁舟獨脫蛟龍穴殘兵夜度遼東城道旁寡妻正啼血題書示兒先生堂前白板厨不藏金玉惟藏書牙籖免譏手未觸非但目覽仍腹儲我無負郭田二頃家傳經訓真菑畬雖然未蒙稽古力修身慎行端有餘汝曹繼志當自勉勿使貽笑金銀車縱無科目可謀進詩禮自足光門閭當今公卿亦下士衣冠獨許來庭除逹知諸老固有命大者鳳閣小石渠一丁不識人所賤漸棄茟硯歸犁鋤語言無味面目俗名勝安肯臨其廬少陵覔句示宗武淵明任運責阿舒古人訓子皆如此賣金買書非吾踈但願爾輩賢復壽世世保此安仁居銀嶺書懷大德乙已端陽將男祖憲祖惠逺遊出門風雨大作四日始度銀嶺泥滑不可言偶誦銀嶺遙遙馬戌高之句蓋古野人語也足而成章泥滑滑泥滑滑竹雞兩聲相間發銀嶺遙遙馬戍高行行白盡征夫髮征夫髮白白如絲樹本欲寧風撓之壯士心腸類鐵石别離肯作兒女悲終南嵩華在何許我欲登高一懷古㑹逐群仙駕紫鸞咳唾九天落香露車中作古樂府車厯轆車厯轆驢牛逐逐雙轉轂可憐喘汗更鞭朴行到深更鞭轉速老夫平生苦暈眩兩手扶頭身蹙縮停車少憩日又出束栝營炊道旁屋牛疲馬跛筋力絶世上利名心未足前車未去後車續車厯轆車厯轆老夫栁下眠正熟鈴丁當鈴丁當大車小車擺作行問渠梱載有何物云是官滿非經商蟠螭金函五色毯鈿螺椅子象牙床美人嬌嬌如海棠面簾半染塵土黃迎門軟腳閙親舊提擎駱甕刲肥羊人生富貴歸故鄉鈴丁當鈴丁當老夫北行書滿箱送惠南歸去年大兒别我歸錢唐江上秋雲飛今年小兒辭我去離亭黃葉燕山路人生百嵗石火光何堪别離苦斷腸蟻穴榮枯祗瞬息蝸角勝名才毫芒胡為天涯更海角山鳥野猿俱笑錯清風明月歸去來白飯黃虀苦不惡眼中太華與黃河酒後耳熱還高歌一瓢一笠春雨裏笑倒道旁春夢婆送永嘉宰王吉卿滿任永嘉令尹氷雪胸永嘉之民齊魯風公未下車六載前鄉村寂莫雞犬空民畏縣門如虎穴吏卒墮突乎西東公來撫字六載後家家機杼年年豐人以庭家視官府心事洞逹民情通剚繁治劇談笑裏興廢補弊千年功平生學道得古意仁愛一念陽春融公庭罕聞響鞭朴千門月色弦歌中乃知德化最有補宜與俗吏開盲聾丹桂江上明晝錦忽起歸興隨征鴻冷官嵗晚感知已雙鳬直上何匆匆願將政績告太史芳猷從此書無窮巢燕行巢中雌燕斃衆雛待哺雄疲於奔役忽弃去越宿别偶一雌以歸對語梁間愛飼加至未幾乘雄之出也盡擠其雛乃自育卵余見其事因紀之烏衣失偶成孤飛巢中黃口爭告饑茫茫天地憐隻影擇配忽復來其雌居梁對語相慰勞衆雛須有更生期誰知微物有機穽詬詬相哺成相欺嚌排轉眼施毒口愛惜乃各私其私一朝育卵重所出父兮獨不哀伯竒親踈恩重有厚薄肝膽楚越將奚為履霜之操亦尚矣之二蟲者曽何知雨中渡揚子江見海怪出沒吳頭楚尾天一隅長江浩渺雲糢糊中流風急浪花湧船頭黃帽驚相呼蜿蜒海怪互出沒踊躍與我為先驅神間意定若無見自笑膽氣由來粗江神雅識詩客意故爾獻狀聊相娛岸旁青帘酒可沽拔劍割炙傾玉壺與君痛飲留斯須此意此意不可孤山川慘淡百戰餘古今變態難盡摹且書雨裏金焦圗丙午端陽抵郡去年别家值端午千山萬山正風雨今年五月燕山路夾道槐隂不知暑居庸翠色何蜿蜒山勢北來欲飛舞岱宗左峙如龍昂太行西蹲疑踞虎祗今王氣壓九州玉帛㑹同來率土五色祥雲耀日轂萬雄金城壯天府車輪馬足生雲烟駭目動心難遍舉平生輿圗見紙上萬里乾坤今眼覩新豐斗酒聊自慰跋涉長途莫辭苦丈夫由來四方志安知貧賤非玉汝杜陵流落詩轉豪子長厯覽文始古况兹京師萬人海偉觀竒聞比林聚石文十鼓承周宣寶鼎千年繼神武雲臺勳臣家寇恂薇垣上相人趙普金臺俊傑多意氣義方詩書立門户風流他日作佳話誰為山川述舊譜世間安得筆如椽玉泉萬丈虹光吐盧溝曉月闌干滉漾晨霜薄馬度石橋人未覺滔滔流水去無聲月輪正挂天西角千村萬落荒雞鳴大車小車相間行停鞭立盡楊栁影孤闕滅沒青山橫薊門飛雨清風夾道槐隂舞誰信青天來白雨馬上郎君走似飛樹下行人猶蟻聚須臾雲散青天開依然九陌飛黃埃乃知造化等兒戲一日變態能千回玉井樵唱卷下
