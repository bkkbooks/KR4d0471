body:
  text: 玉井樵唱卷上元尹廷髙撰五言絶句松下晚興飛雲憩松梢倚松覔詩句沉吟不成章白雲亦飛去題山水畫卷身在山水間心在山水外世無鍾子期白雲兀相對妙高庵半山亭寶所已在近游子倦躋攀努力上復上安樂剎那間七言絶句江鄉夜興極浦霜清鴈打圍漁燈明滅水煙微天寒想是鱸魚少犬吠空江船夜歸山中雪夜竹爐火冷硯生氷童子貪眠喚不應夜靜空山人語寂一窗風雪打吟燈宫詞舞罷金杯袖汚痕沉香亭北月黃昏栁枝無力東風軟昨夜新承雨露恩宮怨二首緑衣無分惹天香滴碎春愁玉漏長日上海棠眠未醒夢隨蝴蝶出宮墻露沐香窠夜不收紫綃夜映翠蟠虬雖然盧阜聞名晚合是花中第一流海棠淵才含恨亦含譏獨羡昌州一種稀欲碾沉檀和清露千林隨處散香霏山茶東風知費幾工夫繡出堂前晝錦圖不假丹砂塗鶴頂任教黃粉染蜂鬚臘梅五出天然蠟綴成詩人千載不知名自從山谷推同姓一日清香偏汴京柯山石橋鑿破乾坤有此橋不知世變幾風濤當時對局縱橫者何似樵夫袖手高小園春莫園林春事頓闌珊花自飄零梅自酸緑樹成隂罷歌舞雙鳩飛下石碁盤杜甫遊春矍哉驢上一吟翁詩好平生不慮窮夢冷草堂無史筆浣溪千載自春風淵明賞菊彭澤歸來百念休西風天地一悠悠白衣未至沈吟久一把寒香萬古秋子猷訪戴乾坤清夜玉含輝萬壑千巗景絶竒一舸自來還自去古今高卧可曽知羲之愛鵝寫經才畢即籠鵝人物風流說永和寂寞荒池已陳迹空留夜月浴寒波雪夕黃葉蕭蕭下庭樹吟懷浩蕩難分付何處鐘聲落翠眉閉門風雪千山暮客星閣萬古嚴灘萬古清秋風杜若老寒汀一江斗宿沉天影那箇中間是客星客中中秋無酒丹桂飄香玉宇清笛聲隱隱度江城客樓醒眼看明月虗負天風吹晚晴書齊即事看了床頭半日書間眠欲下靜工夫女童學畫宮粧額偷抹窗前㸃易朱見一人家以書葉糊窗讀之乃張巡傳因戲題坐守睢陽當豹關江淮賴此得全安至今青史雖零落猶障窗風一面寒夏菊淵明貪卧北窗凉籬下無心為發揚開向薰風根種别不知晚節有重陽客中秋社社日傷心在客中凄然涕淚落秋風故鄉田土荒蕪盡枉向他州說嵗豐翁村思歸一年歸計又蹉跎落盡梨花春不多昨夜翠微深處宿月明無奈子規何早發信安卧憶家山意轉迷十年蹤跡幾東西出門無限陽關思月落孤城雞亂啼謁先君墓十載流離東復西嵗時霜露獨凄凄子規似識終天恨飛上松梢盡日啼送無外僧弟歸奉廬墓二首石田茅屋且隨宜更種梅花滿翠微誦罷楞伽清磬歇倚松間看白雲歸踏遍名山眼界寬歸間且得一身安泥牛入海無消息萬壑千嵓空翠寒耕雲寮即事三首避風自笑學鶢鶋别買青山結草廬幸有薄田可饘粥閉門且讀舊時書石板橋連白竹扉雲深轉覺俗塵稀靜中看盡天機動木落寒塘水鳥飛松風遠覺瀑聲來池畔明窗對竹開睡醒方知凉是雨鳯仙花落滿蒼苔葉法善天師故宅茒山雲間玉笛夜飛霜宫府清虛翠色凉淫樂早知能亂國月宫不遣奏霓裳項羽多疑難逞拔山雄失道隂陵計已窮更恐艤舟人見紿不緣無面見江東范增畢竟知人愧鄼矦數公仗劒自歸劉腹心牙爪皆資敵一老如何佐沐猴靖康北狩舟楫江南方運石兵車漠北又通金喚回艮嶽游仙夢五國城中夜雪深晚歸道中落日蒸烟起亂山煙光山色有無間一綳水墨無人識分付歸鴉自帶還昭君二首身落天涯恨未平昏昏漠月度龍城琵琶馬上千年意只有詩人畫得成草色猶能白變青怪渠妍醜一毫爭自緣謀國無長䇿枉使毛生受惡名金山懷古元公當日好機鋒問倒眉山犢眼翁玉帶圍腰誰縛汝一場公案笑談中虞允文拒完顔亮金甲紅旗已瞰江車船三繞勢俄張立功反出毛錐子愧死酒中劉四廂庚子營又青舊業四首二十年前此戰場隔溪野燐尚凄凉兒童生長他山久却把家鄉作客鄉誰識當年老令威去家千載尚知歸交遊散盡鄰人少只有諸峰繞四圍海宇年來喜晏安减租時拜一分寬太平莫道全無象好向鶯花靜處看燕子重尋舊主人呢喃語别幾經春足間紅縷猶無恙巷口斜陽記不真初夏田家即事二首麥未登場榖正秧山田僧衲間青黃芋畦瓜圃姑停閣且了西疇插種忙茅簇堆庭繭未繅浮槎炊飯濕難燒夫耕婦饁無間暇忘却窗前婆餅焦題妙高庵草庵卓立孤峰頂霜落石頭山月靜天風吹落五更鐘盡大地人都喚醒西湖十詠爛銀盤掛六橋東色貫玻瓈徹底空千頃清光無著處夜深分付與漁翁右平湖秋月翰苑仙人去不還長留遺跡重湖山一鈎殘月鶯呼夢詩在煙光栁色間右蘇堤春曉數板瓊瑶踏未乾沈吟不度據征鞍孤山霽色無尋處笑指梅花隔嵗寒右斷橋殘雪煙光山色淡溟濛千尺浮圗兀倚空湖上畫船歸欲盡孤峰猶帶夕陽紅右雷峰落照晴波淡淡樹冥冥亂擲金梭萬縷青應怪園林風景别數聲婭姹不堪聼右栁浪聞鶯在聚景園今為回回墳細雨初收逐隊嬉何人注目俯寒漪紅粧靜立闌干外吞盡殘香渠未知右花港觀魚虛堂四面枕湖光醖作芙蕖萬斛香獨笑南薰更多事强教西子舞霓裳右麯院荷風鰾眇雷峰隔上方數聲風送到幽窗栁昏花暝遊人散付與山僧帶月撞右南屏晚鐘波仙鼎立據平湖天影清涵水墨圖夜靜老龍鱗甲冷氷壺深處浴明珠右三潭印月嶙峋對峙勢爭雄古塔疏林杳靄中寫盡西湖煙雨障雙尖如筆閣晴空右兩峰插雲新波院舊遊挺挺千竿繞畫簷問君何事此掀髯春風幾度龍孫換却是前身見子瞻古杭塔寺擾擾浮生意未間尋幽得暇扣禪關老僧倚檻心無事目送寒潮入亂山秋夜旅懷夢繞家山舊菊叢芭蕉葉葉又秋風間愁一夜深如海只在空階雨滴中題曲終人不見江上數峰青青山不改重華世玉瑟空餘太古音遺恨湘江流不盡至今眉黛鎖遙岑題挂蓑衣圗衮衣元是抱官愁富貴何人得自由千古蓑衣看不足一竿斜曰轉船頭范增墓二首攻漢亡秦計謾竒君王於汝奈何疑可能少緩須臾死親見烏江匹馬時身作重曈骨鯁臣冢間荒草幾經春殘骸不朽寧多少曽費黃金四萬斤題猫捕蜂圗遊蜂初不識含蟬偶入花隂攪晝眠一線纎腰能幾許枉教瞪目暗垂涎張騫乘槎仙槎正落斗牛間散髮中流意自間却被君平開口笑水窮山盡不知還題一寶境界恆河沙數渺難窮過電浮漚轉眼空惟有故家長不壞黃花翠竹幾秋風題巖門嵌空元不費敲推彈指能令鐵鎖開莫學寒山避人去千年巗縫合蒼苔歐陽希古讀書樓在清河坊道上紅塵利欲鄉天風吹下韵琅琅闌干四面秋聲起一暈青燈夜正長贊達摩畫像莫聼番僧說是非滔滔流水不西歸自從拆斷莖蘆後白浪翻天無了時賦天窗玉片鱗鱗月一方能於暗室泄天光有時急雨敲詩夢尚帶波濤海氣香北關買舟北關門外栁青青間寄江南第一程别酒未闌山鳥唱短蓬撑夢過臨平前村晚泊清晨買飯鱸魚市薄暮停舟杜宇村更有浮家江海客一生蓬底長兒孫姑蘇臺姑蘇臺下水茫茫麋鹿不來春草長栁外闌干誰獨倚玉簫吹怨滿斜陽館娃宮金繡鴛鴦緑錦䄄水精簾底净無塵君王醉枕香紅軟人隔重江正卧薪寒山寺路接楓橋一徑通漁郎遙答隔河舂自從夜禁行人絶不信烏啼城外鐘惠山泉石亂香甘凝不流何人品第到茶甌可能一勺長安水瞞得文饒老舌頭常州百萬西來勢莫攖孤危甘死戰塵腥欲詢往事無遺老日暮城頭鬼火青甘露寺寶閣高橫玉宇寒分明腳底踏焦山長淮渺渺三千里祇在僧窗一榻間中冷泉衮衮魚龍浪氣腥江心何處認中靈茶邉滋味人知少世上空疑陸羽經揚州后土祠瓊花無雙亭下萬人看欲覔殘英一片難夜靜月明猿鶴唳誤翻玉雪墮闌干山陽泊舟南枕湖光北枕淮百年形勢畫圗開黃昏鼓角孤城閉尚記秋風萬馬來舟過彭城黃河三面繞城流雲壓荒臺冷不收千古英雄只如此手遮斜日看徐州彭城夏日燕去樓空事已非柱頭白鶴昔曾歸彭門五月薰風起夾道椿花似雪飛燕山九日老氣橫吞萬里秋不堪白髮對人羞一枝黃菊無情極冷看西風捲客愁燕山寒二首地穴玲瓏石炭紅土床蘆簟覺春融一窗明月江南夢恍在重簾暖閣中孤鴻破曉雪霏霏起整歸裝莫悔遲幸有北風能逐客山靈不用費文移出都門都門曉出興悠悠一片歸心逐海鷗馬上不吟風雪句揚鞭指塔認通州舟中夜興枯葦蕭蕭攪客眠夜深燈火照鄰船闕風雪蓬窗萬里天泊舟淮陽孤舟夜泊倚皇城天際歸心促曉程二十四橋霜月冷卧聼鐘鼓送人行北歸渡揚子狠石年深已緑苔金焦千古畫圖開浪花半角殘陽裏曽見乾坤百戰來四瑞名山古佛在夀寧寺唐末有佛像藏於謝客巖側每見青衣童子出市游人疑之跡其所往至巗忽不見得古佛五十餘身有燈尚明琉璃光裏人間曉儼若靈山未散時不是青衣輕漏泄箇中消息有誰知聖鐘千夫赤手縛淵龍俄聼洪音吼梵宫醉衲不回消息斷高樓殘月五更鐘觀音石磨盡當年殺氣醒石間髣佛見珠纓自從放下屠刀後江上寒潮幾度生蓮經放光七卷流傳自李唐夜深古紙發光芒高人宴坐都無見寂寂中庭月一方宣仁太后遺像謗史欺天祗自欺母能改子更何疑女中今識真堯舜愁絶年年社飯時高瓊太守遺像河流咫尺隔腥羶進寸曽令火德燃江海揚塵龍虎逝英雄猶有畫圗傳題秋山晚色圗千峰含翠入高寒咫尺生綃眼界寬開盡黃花歸未得霜林紅葉畫中看永嘉精舍二首寂寞真如住院僧竛竮瘦影半孤燈法筵第一無他說只有修齊舊葛藤敗簷逼仄怕擡頭孤宦飄零不自由半夜空齊風雨急夢中誤喚繫漁舟臘月海棠尤物真能奪化工臘前偷泄數枝紅霜花不上胭脂面强飾春妍嫁北風立秋日一葉才飛暑漸收西風吹起鬢颼颼清凉入骨皆恩意寄語人間莫怨秋楓塘别業白雲缺處露簷牙雞犬相聞僅數家幽鳥不啼林寂寂滿山黃霧落松花燕山九日每逢佳莭倍思家獨倚高秋感物華莫被黃花瞞醉眼滿城風雨是天涯癸丑元旦即事二首客窗曙色漸朦朧不覺微和上笑容鄉夢醒來殘燭在東風吹送景陽鐘弟兄遙想頌椒盤應望天涯憶嵗寒歸鴈紛紛空北向更無一字寄平安燕山聞杜鶻口占三首蜀魄千年西復西何時風隔别幽棲中原萬里多芳樹却傍五雲深處啼黃塵㸃鬢缺知幾忘却蒼苔滿釣磯想是山靈懶馳檄祗今啼鳥勸人歸石棧天梯路久通羽毛何地不春風到今不信堯夫語浩蕩乾坤一氣中金臺招賢事往久凄凉志氣何人為激昻多少黃金化塵土荒臺千古說昭王虞博士扁所居東西曰陶曰邵以寓尚友古人之意各賦一首重華苖裔許誰同寓意階前舊菊叢一片古音人未識無絃琴裏􅍾南風髣佛行窩舊典型神遊八極手鞭霆羣兒鬭草春風亂欹枕窗前看畫屏南歸過釣臺高風千古水漫漫雲壓雙臺暮色寒惟有倒騎牛背客月明橫笛過嚴灘玉井樵唱卷上
